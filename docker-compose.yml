version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: be-rich-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: CANcer471422;
      POSTGRES_DB: be_rich
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer -d be_rich"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: be-rich-app
    restart: unless-stopped
    ports:
      - "3060:3000"
    environment:
      DATABASE_URL: postgresql://developer:CANcer471422;@db:5432/be_rich?schema=public
      NEXTAUTH_URL: http://localhost:3060
      NEXTAUTH_SECRET: berich-super-secret-key-change-in-production
      NEXT_PUBLIC_APP_URL: http://localhost:3060
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
